version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quantitymeasurement-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Glauniversity@123
      - MSSQL_PID=Express
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - quantitymeasurement-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Glauniversity@123 -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: quantitymeasurement-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - quantitymeasurement-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local

networks:
  quantitymeasurement-network:
    driver: bridge
